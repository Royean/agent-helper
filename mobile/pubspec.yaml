name: agentlinker_mobile
description: AgentLinker Mobile App - Control your devices from anywhere
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 网络
  web_socket_channel: ^2.4.0
  http: ^1.1.0
  
  # 状态管理
  provider: ^6.0.5
  
  # 本地存储
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  
  # UI 组件
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  
  # 工具
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.4.1
  url_launcher: ^6.1.14
  share_plus: ^7.1.0
  clipboard: ^0.1.3
  
  # 通知
  flutter_local_notifications: ^16.2.0
  
  # 文件
  file_picker: ^6.1.1
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: RobotoMono
      fonts:
        - asset: fonts/RobotoMono-Regular.ttf
        - asset: fonts/RobotoMono-Bold.ttf
          weight: 700
